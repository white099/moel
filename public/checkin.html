<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회의 참석 등록</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container narrow">
    <h1>회의 참석 등록</h1>
    <p id="eventTitle"></p>

    <section class="card">
      <form id="checkinForm" class="grid-1">
        <label>
          성명
          <input name="name" required />
        </label>
        <label>
          사업장명
          <input name="workplace" required />
        </label>
        <label>
          직책
          <input name="position" required />
        </label>
        <label>
          휴대전화번호
          <input name="phone" required placeholder="010-1234-5678" />
        </label>
        <label>
          이메일 주소
          <input type="email" name="email" required placeholder="name@example.com" />
        </label>

        <div class="consent-box">
          <p><strong>[개인정보 수집·이용 동의]</strong></p>
          <p>회의 참석 확인 및 사후 연락을 위해 성명, 사업장명, 직책, 휴대전화번호, 이메일 주소를 수집·이용합니다.</p>
          <label class="consent-check">
            <input type="checkbox" name="consent" required />
            개인정보 수집·이용에 동의합니다.
          </label>
        </div>

        <button type="submit">참석 등록</button>
      </form>
      <p id="submitMsg" class="msg"></p>
    </section>
  </main>

  <script src="/checkin.js"></script>
</body>
</html>
