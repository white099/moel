<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회의 QR 접속 포털</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <h1>회의 QR 접속 포털</h1>
    <p>회의 정보와 QR 코드를 확인한 뒤 접속해 주세요.</p>

    <section class="card">
      <h2>회의 정보</h2>
      <p id="meetingInfo" class="msg"></p>
      <div class="row">
        <button id="reloadBtn">다시 불러오기</button>
      </div>
    </section>

    <section class="card">
      <h2>QR 코드</h2>
      <img id="portalQrImage" width="260" height="260" alt="회의 접속 QR 코드" />
      <p><a id="portalCheckinLink" target="_blank" rel="noopener"></a></p>
    </section>
  </main>

  <script src="/portal.js"></script>
</body>
</html>
