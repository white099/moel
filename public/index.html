<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR 참석자 명부 관리자</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
</head>
<body>
  <main class="container">
    <h1>회의 참석자 명부 관리자</h1>
    <section class="card">
      <h2>회의 생성</h2>
      <form id="createEventForm" class="grid-2">
        <label>
          회의명
          <input name="title" required placeholder="예: 2026년 2분기 노사협의회" />
        </label>
        <label>
          회의일자
          <input type="date" name="meeting_date" />
        </label>
        <button type="submit">회의 만들기</button>
      </form>
      <div class="row">
        <button id="jumpToQrBtn" class="hidden" type="button">아래 QR로 바로 이동</button>
      </div>
      <p id="createMsg" class="msg"></p>
    </section>

    <section id="eventPanel" class="card hidden">
      <h2>체크인 QR</h2>
      <p id="eventInfo"></p>
      <canvas id="qrcode"></canvas>
      <img id="checkinQrImage" class="hidden" width="220" height="220" alt="체크인 QR 코드" />
      <p><a id="checkinLink" target="_blank" rel="noopener"></a></p>
      <p><a id="eventPortalLink" target="_blank" rel="noopener"></a></p>
      <div class="row">
        <button id="refreshBtn">명부 새로고침</button>
        <button id="printBtn">명부 출력</button>
        <button id="copyEventPortalBtn">이 회의 QR페이지 복사</button>
        <a id="downloadCsv" class="btn" href="#">CSV 다운로드</a>
      </div>
      <div class="row">
        <input id="csvFileInput" type="file" accept=".csv,text/csv" />
        <button id="importCsvBtn">CSV 업로드로 명부 등록</button>
      </div>
      <p id="importMsg" class="msg"></p>
      <p id="eventMsg" class="msg"></p>
    </section>

    <section id="rosterPanel" class="card hidden">
      <h2>참석자 명부</h2>
      <p id="rosterCount"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>성명</th>
              <th>사업장명</th>
              <th>직책</th>
              <th>휴대전화번호</th>
              <th>이메일 주소</th>
              <th>제출시각</th>
            </tr>
          </thead>
          <tbody id="rosterBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>일정별/회의별 참석자 명부 조회</h2>
      <div class="grid-3">
        <label>
          회의일자
          <input id="rosterFilterDate" type="date" />
        </label>
        <label>
          회의 선택
          <select id="rosterFilterEvent">
            <option value="">전체 회의</option>
          </select>
        </label>
        <div class="inline-actions">
          <button id="rosterSearchBtn" type="button">명부 조회</button>
          <button id="rosterResetBtn" type="button">초기화</button>
        </div>
      </div>
      <p id="rosterQueryMsg" class="msg"></p>
      <p id="rosterQuerySummary"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>회의일자</th>
              <th>회의명</th>
              <th>성명</th>
              <th>사업장명</th>
              <th>직책</th>
              <th>휴대전화번호</th>
              <th>이메일 주소</th>
              <th>제출시각</th>
            </tr>
          </thead>
          <tbody id="rosterQueryBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>노동 이슈 수집/리포트</h2>
      <div class="grid-3">
        <label>
          기간 유형
          <select id="periodType">
            <option value="month">월간</option>
            <option value="quarter">분기</option>
            <option value="half">반기</option>
            <option value="year">연간</option>
          </select>
        </label>
        <label>
          기간 값
          <select id="periodValue"></select>
        </label>
        <div class="inline-actions">
          <button id="collectPeriodBtn">수집 정보 수집/조회</button>
          <button id="toggleRecipientsBtn" type="button">발송 대상 선택</button>
          <button id="sendPeriodBtn">선택 기간 발송</button>
          <button id="sendNowBtn">수시 즉시 발송(현재분기)</button>
        </div>
      </div>
      <div id="recipientPanel" class="report-box hidden">
        <div class="grid-3">
          <label>
            대상 회의일자
            <input id="recipientFilterDate" type="date" />
          </label>
          <label>
            대상 회의
            <select id="recipientFilterEvent">
              <option value="">전체 회의</option>
            </select>
          </label>
          <div class="inline-actions">
            <button id="loadRecipientsBtn" type="button">대상 불러오기</button>
            <button id="selectAllRecipientsBtn" type="button">전체 선택</button>
            <button id="clearRecipientsBtn" type="button">선택 해제</button>
          </div>
        </div>
        <p id="recipientSummary" class="msg"></p>
        <div id="recipientList" class="chips"></div>
      </div>

      <p id="reportMsg" class="msg"></p>
      <div id="collectSourceStats" class="report-box"></div>

      <h3>수집 정보(분야별 이슈 선택)</h3>
      <div class="row">
        <button id="selectAllIssuesBtn" type="button">전체 선택</button>
        <button id="clearIssuesBtn" type="button">일부 선택</button>
        <button id="applyIssueSelectionBtn" type="button">선택 완료</button>
        <button id="previewPdfBtn" type="button">PDF 미리 보기</button>
        <button id="downloadPdfBtn" type="button">PDF 다운로드(선택/전체)</button>
      </div>
      <p id="issueSelectMsg" class="msg"></p>
      <div id="reportPreview" class="report-box"></div>
      <div id="pdfPreviewPanel" class="report-box hidden">
        <h4>PDF 미리 보기</h4>
        <iframe id="pdfPreviewFrame" title="PDF 미리 보기" style="width:100%;height:560px;border:1px solid #d9e0e7;border-radius:8px;"></iframe>
      </div>

      <h3>발송 로그</h3>
      <div class="row">
        <button id="loadLogsBtn">발송 로그 불러오기</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>발송시각</th>
              <th>이메일 수신자</th>
              <th>리포트 항목수</th>
              <th>상태</th>
              <th>상세</th>
            </tr>
          </thead>
          <tbody id="reportLogsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
